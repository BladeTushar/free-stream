<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Stream Party - High Performance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d4a373'/><path d='M30 35h40v25H30zM40 68h20M50 60v8' stroke='%231c1412' stroke-width='6' stroke-linecap='round' fill='none'/></svg>">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1c1412 0%, #2b1e1b 100%);
            --panel-bg: rgba(54, 41, 38, 0.55);
            --panel-border: rgba(220, 203, 191, 0.12);
            --accent-color: #d4a373;
            --accent-glow: rgba(212, 163, 115, 0.4);
            --danger-color: #e07a5f;
            --danger-glow: rgba(224, 122, 95, 0.4);
            --text-main: #fefae0;
            --text-muted: #cca997;
            --success-color: #81b29a;
            --off-white: #fefae0;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            padding: 20px 0;
        }

        .app-container-wrapper {
            width: 95%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .app-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 24px;
            animation: fadeIn 0.6s ease-out;
        }

        .main-content {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 28px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            height: calc(100vh - 120px);
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 22px;
            padding-top: 10px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .minimal-logo-svg {
            width: 32px;
            height: 32px;
            transform: translateY(2px);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            text-transform: lowercase;
            color: var(--off-white);
            letter-spacing: -0.5px;
            position: relative;
            display: inline-block;
            text-shadow: 
                -1px 1px 0px #0b0706,
                -2px 2px 0px #0b0706,
                -3px 3px 0px var(--accent-color),
                -4px 4px 0px var(--accent-color),
                -5px 5px 0px #0b0706,
                -6px 6px 0px #0b0706;
        }

        .status-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #d5bdaf;
            border-radius: 50%;
        }

        .status-dot.active {
            background-color: var(--success-color);
            box-shadow: 0 0 12px var(--success-color);
        }

        .status-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .video-wrapper-relative {
            position: relative;
            width: 100%;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ambient-glow-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            filter: blur(80px) opacity(0.55);
            pointer-events: none;
            z-index: 1;
            transform: scale(1.05);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 18px;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #0b0706;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(254, 250, 224, 0.05);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .stream-placeholder-msg {
            position: absolute;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            z-index: 1;
        }

        .stream-placeholder-msg svg {
            width: 44px;
            height: 44px;
            opacity: 0.4;
            stroke: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        button, select, input[type="text"] {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(254, 250, 224, 0.06);
            color: var(--text-main);
            border: 1px solid var(--panel-border);
            padding: 12px 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-sizing: border-box;
        }

        input[type="text"] {
            cursor: text;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(254, 250, 224, 0.1);
        }

        select {
            appearance: none;
            outline: none;
            padding-right: 35px;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23d4a373' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }

        button:hover, select:hover { 
            background: rgba(254, 250, 224, 0.12);
            transform: translateY(-1px);
        }

        .btn-start { background: var(--accent-color) !important; color: #1c1412 !important; box-shadow: 0 4px 14px var(--accent-glow); font-weight: 700; }
        .btn-stop { background: var(--danger-color) !important; color: #fff !important; box-shadow: 0 4px 14px var(--danger-glow); font-weight: 700; }
        .btn-mic-on { background: var(--success-color) !important; color: #1c1412 !important; font-weight: 700; }
        .btn-mic-off { background: rgba(224, 122, 95, 0.15) !important; color: var(--danger-color) !important; }

        .profile-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 12px;
        }

        .profile-section span {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 190px;
        }

        .btn-edit-name {
            padding: 5px 10px;
            font-size: 0.7rem;
            border-radius: 8px;
        }

        .name-edit-input {
            width: 100%;
            padding: 6px 12px !important;
            font-size: 0.8rem !important;
            border-radius: 10px !important;
        }

        .sidebar h2 {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-main);
            padding-top: 4px;
            font-weight: 700;
        }

        .viewer-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            max-height: 160px;
            min-height: 100px;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 12px;
        }

        .viewer-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(213, 189, 175, 0.04);
            border: 1px solid rgba(213, 189, 175, 0.03);
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .viewer-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .viewer-avatar {
            width: 22px;
            height: 22px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #1c1412;
        }

        .voice-indicator {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            width: 20px;
            height: 15px;
            opacity: 0.2;
            transition: opacity 0.2s ease;
        }

        .voice-indicator.speaking {
            opacity: 1;
        }

        .bar {
            width: 3px;
            height: 4px;
            background-color: var(--success-color);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        .voice-indicator.speaking .bar:nth-child(1) { animation: bounce 0.6s ease-in-out infinite alternate; }
        .voice-indicator.speaking .bar:nth-child(2) { animation: bounce 0.4s ease-in-out infinite alternate 0.1s; }
        .voice-indicator.speaking .bar:nth-child(3) { animation: bounce 0.5s ease-in-out infinite alternate 0.2s; }

        .chat-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
            gap: 10px;
            position: relative;
        }

        .chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
            padding-bottom: 20px;
        }

        .chat-bubble {
            background: rgba(254, 250, 224, 0.04);
            border: 1px solid rgba(254, 250, 224, 0.03);
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 0.75rem;
            word-break: break-word;
            line-height: 1.4;
        }

        .chat-bubble.system-msg {
            background: rgba(212, 163, 115, 0.05);
            border-color: rgba(212, 163, 115, 0.1);
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
        }

        .chat-user-tag {
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 2px;
            font-size: 0.7rem;
        }

        .typing-status-indicator {
            position: absolute;
            bottom: 58px;
            left: 4px;
            font-size: 0.68rem;
            color: var(--text-muted);
            font-style: italic;
            display: none;
            animation: pulseFade 1.5s infinite alternate;
            z-index: 5;
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
            z-index: 6;
        }

        .chat-input-row input {
            flex-grow: 1;
            padding: 10px 14px !important;
            font-size: 0.75rem !important;
            border-radius: 12px !important;
        }

        .chat-input-row button {
            padding: 10px 16px !important;
            border-radius: 12px !important;
        }

        @keyframes bounce { from { height: 4px; } to { height: 15px; } }
        @keyframes pulseFade { from { opacity: 0.5; } to { opacity: 1; } }

        .badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(129, 178, 154, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #a8dadc;
            z-index: 10;
        }

        .chromium-footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.65;
            letter-spacing: 0.3px;
            margin-top: 5px;
        }

        #audio-container, #hidden-ambient-canvas { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 900px) { .app-layout { grid-template-columns: 1fr; } .sidebar { height: 450px; } }
    </style>
</head>
<body>

    <div class="app-container-wrapper">
        <div class="app-layout">
            <div class="main-content">
                <header>
                    <div class="logo-container">
                        <svg class="minimal-logo-svg" viewBox="0 0 100 100">
                            <rect width="100" height="100" rx="20" fill="#d4a373"/>
                            <path d="M30 35h40v25H30zM40 68h20M50 60v8" stroke="#1c1412" stroke-width="6" stroke-linecap="round" fill="none"/>
                        </svg>
                        <h1>free stream party</h1>
                    </div>
                    <div class="status-wrapper">
                        <div id="status-dot" class="status-dot"></div>
                        <div id="status-text" class="status-text">Connecting...</div>
                    </div>
                </header>

                <div class="video-wrapper-relative">
                    <canvas id="ambient-glow-backdrop" class="ambient-glow-backdrop"></canvas>

                    <div class="video-container" id="video-box-container">
                        <div class="stream-placeholder-msg" id="stream-fallback-ui">
                            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 16V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2zM6 22h12M10 18v4"></path>
                            </svg>
                            <span id="fallback-status-string">Waiting for host to share screen...</span>
                        </div>
                        
                        <div class="badge" id="quality-badge" style="display: none;">Live Feed Connected</div>
                        <video id="remote-video" autoplay playsinline controls style="display: none;"></video>
                    </div>
                </div>

                <div class="controls">
                    <button id="stream-toggle-btn" class="btn-start">Start Sharing</button>
                    <select id="quality-select">
                        <option value="720p">720p (Recommended / No Lag)</option>
                        <option value="1080p">1080p (Requires Fast Upload)</option>
                    </select>
                    <button id="swap-stream-btn" style="display: none;">换 Window</button>
                    <button id="mic-toggle-btn" class="btn-mic-off">Mic: Muted</button>
                    <button id="pip-btn" style="display: none;">🔲 Miniplayer</button>
                    <button id="copy-link-btn" style="display: none;">Copy Invite Link</button>
                </div>
            </div>

            <div class="sidebar">
                <div class="profile-section" id="profile-area">
                    <span id="display-name-label">Loading...</span>
                    <button id="edit-name-btn" class="btn-edit-name">Edit</button>
                </div>

                <h2>Lobby Party (<span id="party-count">1</span>)</h2>
                <div class="viewer-list" id="viewer-list"></div>

                <div class="chat-container">
                    <div class="chat-messages" id="chat-messages-box">
                        <div class="chat-bubble system-msg">Welcome to the lounge room text channel!</div>
                    </div>
                    <div class="typing-status-indicator" id="typing-prompt-box">Someone is typing...</div>
                    <div class="chat-input-row">
                        <input type="text" id="chat-input-field" placeholder="Type a message..." autocomplete="off">
                        <button id="chat-send-btn" class="btn-start">Send</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="chromium-footer-note">
            Use Chromium based browsers for the best streaming experience.
        </div>
    </div>

    <div id="audio-container"></div>
    <canvas id="hidden-ambient-canvas" width="64" height="36"></canvas>

    <script>
        const streamToggleBtn = document.getElementById('stream-toggle-btn');
        const swapStreamBtn = document.getElementById('swap-stream-btn');
        const micToggleBtn = document.getElementById('mic-toggle-btn');
        const pipBtn = document.getElementById('pip-btn');
        const copyLinkBtn = document.getElementById('copy-link-btn');
        const qualitySelect = document.getElementById('quality-select');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const remoteVideo = document.getElementById('remote-video');
        const qualityBadge = document.getElementById('quality-badge');
        const viewerListContainer = document.getElementById('viewer-list');
        const partyCountSpan = document.getElementById('party-count');
        const audioContainer = document.getElementById('audio-container');

        const fallbackStatusString = document.getElementById('fallback-status-string');
        const streamFallbackUi = document.getElementById('stream-fallback-ui');

        const ambientBackdropCanvas = document.getElementById('ambient-glow-backdrop');
        const hiddenCanvas = document.getElementById('hidden-ambient-canvas');
        const ambientCtx = ambientBackdropCanvas.getContext('2d');
        const hiddenCtx = hiddenCanvas.getContext('2d');
        let ambientAnimationId = null;

        const profileArea = document.getElementById('profile-area');
        const displayNameLabel = document.getElementById('display-name-label');
        const editNameBtn = document.getElementById('edit-name-btn');
        const chatMessagesBox = document.getElementById('chat-messages-box');
        const chatInputField = document.getElementById('chat-input-field');
        const chatSendBtn = document.getElementById('chat-send-btn');
        const typingPromptBox = document.getElementById('typing-prompt-box');

        let peer = null;
        let localScreenStream = null;
        let localMicStream = null;
        let isStreaming = false;
        let isMicOn = false;
        
        let connectedPeersMap = {}; 
        let activeCallsArray = []; 
        let lobbyMembersList = [];
        let typingUsersTracker = {};

        let audioContext = null;
        let localAnalyser = null;
        let typingTimeoutId = null;
        let isCurrentlyTypingState = false;

        const adjectives = ["Mocha", "Espresso", "Hazelnut", "Creamy", "Toasty", "Roasted", "Chestnut", "Velvet", "Golden"];
        const nouns = ["Barista", "Otter", "Fox", "Panda", "Sloth", "Beaver", "Owl", "Falcon", "Koala"];
        let myRandomName = adjectives[Math.floor(Math.random() * adjectives.length)] + " " + nouns[Math.floor(Math.random() * nouns.length)];

        displayNameLabel.innerText = myRandomName + " (You)";

        if ('pictureInPictureEnabled' in document) pipBtn.style.display = 'inline-flex';

        const urlParams = new URLSearchParams(window.location.search);
        const targetRoomId = urlParams.get('room');
        const isHost = !targetRoomId;

        // SPEED UPGRADE: Explicit Trickle ICE and forced IPv4 optimization properties
        const peerConfig = {
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' }
                ],
                iceTransportPolicy: 'all',
                iceCandidatePoolSize: 2 // Pre-gathers routing pipes before call is initiated to maximize connection speeds
            }
        };

        if (isHost) {
            const generatedRoomId = 'party-' + Math.random().toString(36).substring(2, 9);
            peer = new Peer(generatedRoomId, peerConfig);
            statusText.innerText = "Opening lounge room...";
            addToLobbyDisplay(peer.id, myRandomName);
            
            setInterval(() => {
                if (!isStreaming) return;
                Object.values(connectedPeersMap).forEach(p => {
                    if (p.connection.open) p.connection.send({ type: 'ping-pulse' });
                });
            }, 4000);
        } else {
            peer = new Peer(peerConfig);
            streamToggleBtn.style.display = 'none';
            qualitySelect.style.display = 'none';
            statusText.innerText = "Entering lobby gates...";
        }

        peer.on('open', (id) => {
            statusDot.classList.add('active');
            if (isHost) {
                statusText.innerText = "Lobby ready.";
                copyLinkBtn.style.display = 'inline-flex';
                setupInviteLink(id);
            } else {
                statusText.innerText = "Syncing network layers...";
                // SPEED UPGRADE: Connect immediately with trickle tokens
                const dataConn = peer.connect(targetRoomId, { reliable: true });
                handleDataConnection(dataConn);
            }
        });

        function setupInviteLink(id) {
            const inviteUrl = `${window.location.origin}${window.location.pathname}?room=${id}`;
            copyLinkBtn.onclick = () => {
                navigator.clipboard.writeText(inviteUrl);
                copyLinkBtn.innerText = "Link Copied";
                setTimeout(() => copyLinkBtn.innerText = "Copy Invite Link", 2000);
            };
        }

        peer.on('connection', (conn) => { handleDataConnection(conn); });

        function playSoothingNotificationChime() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                const osc1 = ctx.createOscillator();
                const gain1 = ctx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(783.99, ctx.currentTime);
                
                const osc2 = ctx.createOscillator();
                const gain2 = ctx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(1046.50, ctx.currentTime + 0.08);

                gain1.gain.setValueAtTime(0.0, ctx.currentTime);
                gain1.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 0.04);
                gain1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);

                gain2.gain.setValueAtTime(0.0, ctx.currentTime + 0.08);
                gain2.gain.linearRampToValueAtTime(0.08, ctx.currentTime + 0.12);
                gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);

                osc1.connect(gain1);
                gain1.connect(ctx.destination);
                osc2.connect(gain2);
                gain2.connect(ctx.destination);

                osc1.start(ctx.currentTime);
                osc1.stop(ctx.currentTime + 0.4);
                osc2.start(ctx.currentTime + 0.08);
                osc2.stop(ctx.currentTime + 0.5);
            } catch (e) {
                console.warn("Audio thread block intercepted successfully.");
            }
        }

        function handleDataConnection(conn) {
            conn.on('close', () => { handlePeerDisconnection(conn.peer); });
            conn.on('error', () => { handlePeerDisconnection(conn.peer); });

            conn.on('open', () => { 
                conn.send({ type: 'handshake', name: myRandomName }); 
                setupConnectionStabilityMonitor(conn.peerConnection, conn.peer);
            });

            conn.on('data', (data) => {
                if (data.type === 'handshake') {
                    connectedPeersMap[conn.peer] = { name: data.name, connection: conn };
                    addToLobbyDisplay(conn.peer, data.name);
                    if (isHost) {
                        broadcastLobbyState();
                        if (localScreenStream && isStreaming) {
                            triggerMediaCallWithICE(conn.peer);
                        }
                    }
                }
                if (data.type === 'name-update') {
                    if (connectedPeersMap[conn.peer]) {
                        connectedPeersMap[conn.peer].name = data.newName;
                    }
                    updateLobbyMemberName(conn.peer, data.newName);
                    if (isHost) broadcastLobbyState();
                }
                if (data.type === 'chat-msg') {
                    appendChatBubble(data.senderName, data.text);
                    playSoothingNotificationChime(); 
                }
                if (data.type === 'stream-stopped') {
                    handleStreamTerminationUI(false);
                }
                if (data.type === 'typing-start') {
                    typingUsersTracker[conn.peer] = data.senderName;
                    renderTypingIndicatorLabel();
                }
                if (data.type === 'typing-stop') {
                    delete typingUsersTracker[conn.peer];
                    renderTypingIndicatorLabel();
                }
                if (data.type === 'ping-pulse') {
                    if(conn.open) conn.send({ type: 'pong-ack' });
                }
                if (data.type === 'lobby-update') syncLobbyList(data.list);
                if (data.type === 'speaking-state') updateVoiceIndicator(data.peerId, data.isSpeaking);
            });
        }

        function setupConnectionStabilityMonitor(peerConnection, peerId) {
            if (!peerConnection) return;

            const handleICEDropout = () => {
                if (peerConnection.iceConnectionState === 'failed' || peerConnection.iceConnectionState === 'disconnected') {
                    if (isHost && localScreenStream && isStreaming) {
                        triggerMediaCallWithICE(peerId, true);
                    }
                }
            };

            peerConnection.oniceconnectionstatechange = handleICEDropout;
            peerConnection.onconnectionstatechange = handleICEDropout;
        }

        function triggerMediaCallWithICE(targetId, forceRestart = false) {
            const options = { 
                metadata: { type: 'video' },
                constraints: { mandatory: { OfferToReceiveVideo: true } }
            };
            if (forceRestart) {
                options.iceRestart = true;
            }
            
            const call = peer.call(targetId, localScreenStream, options);
            activeCallsArray.push(call);
            optimizeConnection(call.peerConnection);
            setupConnectionStabilityMonitor(call.peerConnection, targetId);
        }

        function handlePeerDisconnection(peerId) {
            if (!connectedPeersMap[peerId] && !lobbyMembersList.some(m => m.id === peerId)) return;
            delete connectedPeersMap[peerId];
            delete typingUsersTracker[peerId];
            renderTypingIndicatorLabel();
            removeFromLobbyDisplay(peerId);
            
            if (!isHost && peerId === targetRoomId) {
                handleStreamTerminationUI(false);
                fallbackStatusString.innerHTML = `
                    <div style="display:flex; flex-direction:column; gap:12px; align-items:center;">
                        <span>Host disconnected or stream dropped.</span>
                        <button onclick="window.location.reload();" class="btn-start" style="padding:8px 16px; font-size:0.75rem; margin-top:5px;">
                            🔄 Click to Reconnect
                        </button>
                    </div>
                `;
            }

            if (isHost) broadcastLobbyState();
        }

        window.addEventListener('beforeunload', () => {
            if (isHost && isStreaming) {
                Object.values(connectedPeersMap).forEach(p => {
                    if (p.connection.open) p.connection.send({ type: 'stream-stopped' });
                });
            }
        });

        chatInputField.addEventListener('input', () => {
            if (!isCurrentlyTypingState) {
                isCurrentlyTypingState = true;
                sendTypingSignalBroadcast('typing-start');
            }
            
            clearTimeout(typingTimeoutId);
            typingTimeoutId = setTimeout(() => {
                isCurrentlyTypingState = false;
                sendTypingSignalBroadcast('typing-stop');
            }, 1800);
        });

        function sendTypingSignalBroadcast(typeString) {
            Object.values(connectedPeersMap).forEach(p => {
                if (p.connection.open) p.connection.send({ type: typeString, senderName: myRandomName });
            });
        }

        function renderTypingIndicatorLabel() {
            const users = Object.values(typingUsersTracker);
            if (users.length === 0) {
                typingPromptBox.style.display = 'none';
            } else if (users.length === 1) {
                typingPromptBox.innerText = `${users[0]} is typing...`;
                typingPromptBox.style.display = 'block';
            } else {
                typingPromptBox.innerText = `Multiple people typing...`;
                typingPromptBox.style.display = 'block';
            }
        }

        editNameBtn.addEventListener('click', () => {
            if (editNameBtn.innerText === "Edit") {
                const currentVal = displayNameLabel.innerText.replace(" (You)", "");
                profileArea.innerHTML = `
                    <input type="text" id="name-edit-input" class="name-edit-input" value="${currentVal}" maxlength="18">
                    <button id="save-name-btn" class="btn-edit-name" style="background:var(--success-color);color:#1c1412;">Save</button>
                `;
                const inputField = document.getElementById('name-edit-input');
                const saveBtn = document.getElementById('save-name-btn');
                
                inputField.focus();
                inputField.select();

                const triggerSave = () => {
                    const cleanName = inputField.value.trim();
                    if(cleanName.length > 0) {
                        myRandomName = cleanName;
                    }
                    profileArea.innerHTML = `
                        <span id="display-name-label">${myRandomName} (You)</span>
                        <button id="edit-name-btn" class="btn-edit-name">Edit</button>
                    `;
                    displayNameLabel.innerText = myRandomName + " (You)";
                    updateLobbyMemberName(peer.id, myRandomName);
                    
                    Object.values(connectedPeersMap).forEach(p => {
                        if (p.connection.open) p.connection.send({ type: 'name-update', newName: myRandomName });
                    });
                    if (!isHost) {
                        const hostPeer = Object.values(connectedPeersMap)[0];
                        if (hostPeer && hostPeer.connection.open) {
                            hostPeer.connection.send({ type: 'name-update', newName: myRandomName });
                        }
                    } else {
                        broadcastLobbyState();
                    }
                    document.getElementById('edit-name-btn').addEventListener('click', () => editNameBtn.click());
                };

                saveBtn.onclick = triggerSave;
                inputField.onkeydown = (e) => { if(e.key === 'Enter') triggerSave(); };
            }
        });

        function sendChatMessage() {
            const rawText = chatInputField.value.trim();
            if (rawText.length === 0) return;

            clearTimeout(typingTimeoutId);
            isCurrentlyTypingState = false;
            sendTypingSignalBroadcast('typing-stop');

            appendChatBubble(myRandomName, rawText);
            chatInputField.value = "";

            Object.values(connectedPeersMap).forEach(p => {
                if (p.connection.open) {
                    p.connection.send({ type: 'chat-msg', senderName: myRandomName, text: rawText });
                }
            });
        }

        chatSendBtn.onclick = sendChatMessage;
        chatInputField.onkeydown = (e) => { if (e.key === 'Enter') sendChatMessage(); };

        function appendChatBubble(sender, text) {
            const bubble = document.createElement('div');
            bubble.className = "chat-bubble";
            bubble.innerHTML = `
                <div class="chat-user-tag">${sender}</div>
                <div>${text}</div>
            `;
            chatMessagesBox.appendChild(bubble);
            chatMessagesBox.scrollTop = chatMessagesBox.scrollHeight;
        }

        micToggleBtn.addEventListener('click', async () => {
            if (!isMicOn) {
                try {
                    localMicStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }, 
                        video: false 
                    });
                    isMicOn = true;
                    micToggleBtn.innerText = "Mic: Talk Active";
                    micToggleBtn.className = "btn-mic-on";

                    setupLocalVoiceAnalyzer(localMicStream);

                    Object.keys(connectedPeersMap).forEach(peerId => {
                        const call = peer.call(peerId, localMicStream, { metadata: { type: 'voice' } });
                        bindVoiceDisconnect(call);
                    });
                    if (!isHost) {
                        const call = peer.call(targetRoomId, localMicStream, { metadata: { type: 'voice' } });
                        bindVoiceDisconnect(call);
                    }
                } catch (err) { statusText.innerText = "Mic connection error."; }
            } else {
                if (localMicStream) localMicStream.getTracks().forEach(t => t.stop());
                isMicOn = false;
                micToggleBtn.innerText = "Mic: Muted";
                micToggleBtn.className = "btn-mic-off";
                updateVoiceIndicator(peer.id, false);
                sendSpeakingStateToAll(false);
            }
        });

        function bindVoiceDisconnect(call) {
            call.on('close', () => {
                const targetAudio = document.getElementById(`audio-${call.peer}`);
                if (targetAudio) targetAudio.remove();
            });
        }

        function setupLocalVoiceAnalyzer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            localAnalyser = audioContext.createAnalyser();
            localAnalyser.fftSize = 512;
            source.connect(localAnalyser);
            
            const bufferLength = localAnalyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            let wasSpeaking = false;

            function checkVolume() {
                if (!isMicOn) return;
                localAnalyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < bufferLength; i++) total += dataArray[i];
                let average = total / bufferLength;
                
                let isSpeaking = average > 12; 
                if (isSpeaking !== wasSpeaking) {
                    updateVoiceIndicator(peer.id, isSpeaking);
                    sendSpeakingStateToAll(isSpeaking);
                    wasSpeaking = isSpeaking;
                }
                requestAnimationFrame(checkVolume);
            }
            checkVolume();
        }

        function sendSpeakingStateToAll(isSpeaking) {
            Object.values(connectedPeersMap).forEach(p => {
                if (p.connection.open) p.connection.send({ type: 'speaking-state', peerId: peer.id, isSpeaking: isSpeaking });
            });
        }

        peer.on('call', (call) => {
            call.answer(isMicOn ? localMicStream : null);
            call.on('stream', (incomingStream) => {
                const streamType = call.metadata ? call.metadata.type : 'video';
                if (streamType === 'video') {
                    incomingStream.getVideoTracks()[0].onmute = () => handleStreamTerminationUI(false);
                    incomingStream.getVideoTracks()[0].onunmute = () => {
                        remoteVideo.style.display = 'block';
                        streamFallbackUi.style.display = 'none';
                        qualityBadge.style.display = 'block';
                    };

                    remoteVideo.srcObject = incomingStream;
                    remoteVideo.style.display = 'block';
                    streamFallbackUi.style.display = 'none';
                    qualityBadge.style.display = 'block';
                } else if (streamType === 'voice') {
                    let audioEl = document.getElementById(`audio-${call.peer}`);
                    if (!audioEl) {
                        audioEl = document.createElement('audio');
                        audioEl.id = `audio-${call.peer}`;
                        audioEl.autoplay = true;
                        audioContainer.appendChild(audioEl);
                    }
                    audioEl.srcObject = incomingStream;
                }
            });
            optimizeConnection(call.peerConnection);
            setupConnectionStabilityMonitor(call.peerConnection, call.peer);
            
            call.on('close', () => {
                const targetAudio = document.getElementById(`audio-${call.peer}`);
                if (targetAudio) targetAudio.remove();
            });
        });

        function optimizeConnection(peerConnection) {
            if (!peerConnection) return;
            peerConnection.addEventListener('track', () => {
                const senders = peerConnection.getSenders();
                senders.forEach(sender => {
                    if (sender.track && sender.track.kind === 'video') {
                        const parameters = sender.getParameters();
                        if (!parameters.encodings) parameters.encodings = [{}];
                        
                        parameters.encodings[0].degradationPreference = 'maintain-framerate';
                        
                        const selectedQuality = qualitySelect.value;
                        if (selectedQuality === '720p') {
                            parameters.encodings[0].maxBitrate = 2200000; 
                        } else {
                            parameters.encodings[0].maxBitrate = 4500000; 
                        }
                        
                        sender.setParameters(parameters).catch(console.error);
                    }
                });
            });
        }

        function initAmbientEngineLoop() {
            if (remoteVideo.paused || remoteVideo.ended || remoteVideo.style.display === 'none') {
                ambientCtx.clearRect(0, 0, ambientBackdropCanvas.width, ambientBackdropCanvas.height);
                return;
            }
            hiddenCtx.drawImage(remoteVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            ambientCtx.drawImage(hiddenCanvas, 0, 0, ambientBackdropCanvas.width, ambientBackdropCanvas.height);
            ambientAnimationId = requestAnimationFrame(initAmbientEngineLoop);
        }

        remoteVideo.addEventListener('play', () => {
            ambientBackdropCanvas.width = remoteVideo.clientWidth / 4;
            ambientBackdropCanvas.height = remoteVideo.clientHeight / 4;
            initAmbientEngineLoop();
        });
        remoteVideo.addEventListener('pause', () => cancelAnimationFrame(ambientAnimationId));
        remoteVideo.addEventListener('ended', () => cancelAnimationFrame(ambientAnimationId));

        streamToggleBtn.addEventListener('click', async () => {
            if (!isStreaming) {
                try {
                    const mode = qualitySelect.value;
                    const vConstraints = mode === '720p' 
                        ? { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60, max: 60 } }
                        : { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60, max: 60 } };
                    
                    if (navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
                        localScreenStream = await navigator.mediaDevices.getDisplayMedia({
                            video: { ...vConstraints, displaySurface: "monitor" },
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false,
                                suppressLocalAudioPlayback: false
                            }
                        });

                        if (localScreenStream.getAudioTracks().length === 0) {
                            statusText.innerText = "Notice: Desktop audio not checked in picker.";
                        } else {
                            statusText.innerText = "Lobby ready. Audio channel initialized.";
                        }
                    } 
                    else if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                        statusText.innerText = "Mobile device: Launching camera feed...";
                        localScreenStream = await navigator.mediaDevices.getUserMedia({
                            video: { 
                                facingMode: "user",
                                width: { ideal: 1280 },
                                height: { ideal: 720 }
                            },
                            audio: false
                        });
                    } else {
                        throw new Error("Streaming media options are unavailable on this device.");
                    }

                    remoteVideo.srcObject = localScreenStream;
                    remoteVideo.style.display = 'block';
                    streamFallbackUi.style.display = 'none';
                    remoteVideo.muted = true;
                    isStreaming = true;
                    streamToggleBtn.innerText = "Stop Sharing";
                    streamToggleBtn.className = "btn-stop";
                    
                    if (navigator.mediaDevices.getDisplayMedia) swapStreamBtn.style.display = 'inline-flex';

                    Object.keys(connectedPeersMap).forEach(peerId => {
                        triggerMediaCallWithICE(peerId);
                    });

                    localScreenStream.getVideoTracks()[0].onended = () => handleStreamTerminationUI(true);
                } catch (err) { 
                    console.error(err); 
                    statusText.innerText = "Stream Exception: " + err.message;
                }
            } else { handleStreamTerminationUI(true); }
        });

        swapStreamBtn.addEventListener('click', async () => {
            if (!isStreaming || !localScreenStream || !navigator.mediaDevices.getDisplayMedia) return;
            try {
                const mode = qualitySelect.value;
                const vConstraints = mode === '720p' 
                    ? { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 60, max: 60 } }
                    : { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 60, max: 60 } };

                const newStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { ...vConstraints, displaySurface: "monitor" },
                    audio: { echoCancellation: false, noiseSuppression: false }
                });
                const newVideoTrack = newStream.getVideoTracks()[0];
                remoteVideo.srcObject = newStream;
                
                activeCallsArray.forEach(call => {
                    const videoSender = call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (videoSender) videoSender.replaceTrack(newVideoTrack);
                });

                localScreenStream.getVideoTracks()[0].stop();
                localScreenStream = newStream;
                localScreenStream.getVideoTracks()[0].onended = () => handleStreamTerminationUI(true);
            } catch (err) { console.error(err); }
        });

        function handleStreamTerminationUI(isLocalHostAction = false) {
            if (document.pictureInPictureElement) document.exitPictureInPicture().catch(console.error);
            
            cancelAnimationFrame(ambientAnimationId);
            ambientCtx.clearRect(0, 0, ambientBackdropCanvas.width, ambientBackdropCanvas.height);

            if (isLocalHostAction) {
                Object.values(connectedPeersMap).forEach(p => {
                    if (p.connection.open) p.connection.send({ type: 'stream-stopped' });
                });

                if (localScreenStream) localScreenStream.getTracks().forEach(t => t.stop());
                activeCallsArray.forEach(call => call.close());
                activeCallsArray = [];
            }
            
            remoteVideo.srcObject = null;
            remoteVideo.style.display = 'none';
            qualityBadge.style.display = 'none';
            streamFallbackUi.style.display = 'flex';

            if (isLocalHostAction) {
                isStreaming = false;
                streamToggleBtn.innerText = "Start Sharing";
                streamToggleBtn.className = "btn-start";
                swapStreamBtn.style.display = 'none';
                fallbackStatusString.innerText = "Waiting for host to share screen...";
            } else {
                fallbackStatusString.innerText = "Host has stopped streaming.";
            }
        }

        function addToLobbyDisplay(id, name) {
            const existingIndex = lobbyMembersList.findIndex(m => m.id === id);
            const entryData = { id, name: name, isSpeaking: false };
            
            if (existingIndex !== -1) {
                lobbyMembersList[existingIndex] = entryData;
            } else {
                lobbyMembersList.push(entryData);
            }
            renderLobbyUI();
        }

        function updateLobbyMemberName(id, newName) {
            const member = lobbyMembersList.find(m => m.id === id);
            if (member) {
                member.name = newName;
                renderLobbyUI();
            }
        }

        function removeFromLobbyDisplay(id) {
            lobbyMembersList = lobbyMembersList.filter(m => m.id !== id);
            const el = document.getElementById(`audio-${id}`);
            if (el) el.remove();
            renderLobbyUI();
        }

        function syncLobbyList(newList) {
            if (!isHost) {
                lobbyMembersList = newList.map(m => m.id === peer.id ? { id: m.id, name: myRandomName, isSpeaking: m.isSpeaking } : m);
            } else {
                lobbyMembersList = lobbyMembersList.filter(m => m.id === peer.id || connectedPeersMap[m.id]);
            }
            renderLobbyUI();
        }

        function broadcastLobbyState() {
            lobbyMembersList = lobbyMembersList.filter(m => m.id === peer.id || connectedPeersMap[m.id]);
            Object.values(connectedPeersMap).forEach(p => {
                if (p.connection.open) p.connection.send({ type: 'lobby-update', list: lobbyMembersList });
            });
        }

        function updateVoiceIndicator(peerId, isSpeaking) {
            const indicator = document.getElementById(`voice-icon-${peerId}`);
            if (indicator) {
                if (isSpeaking) indicator.classList.add('speaking');
                else indicator.classList.remove('speaking');
            }
            const member = lobbyMembersList.find(m => m.id === peerId);
            if (member) member.isSpeaking = isSpeaking;
        }

        function renderLobbyUI() {
            viewerListContainer.innerHTML = "";
            partyCountSpan.innerText = lobbyMembersList.length;
            lobbyMembersList.forEach(member => {
                let labelSuffix = "";
                
                const memberIsHost = isHost ? (member.id === peer.id) : (member.id === targetRoomId);
                const memberIsMe = (member.id === peer.id);
                
                if (memberIsHost) labelSuffix += " (Host)";
                if (memberIsMe) labelSuffix += " (You)";

                const item = document.createElement('div');
                item.className = "viewer-item";
                item.innerHTML = `
                    <div class="viewer-info">
                        <div class="viewer-avatar">${member.name.charAt(0)}</div>
                        <span>${member.name}${labelSuffix}</span>
                    </div>
                    <div class="voice-indicator ${member.isSpeaking ? 'speaking' : ''}" id="voice-icon-${member.id}">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                `;
                viewerListContainer.appendChild(item);
            });
        }
    </script>
</body>
</html>
